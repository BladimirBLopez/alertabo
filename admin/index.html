<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Panel de administración — AlertaBo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>

  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
  <div class="pagina-login">
    <div class="tarjeta-login">
      <div class="tarjeta-login__icono">
        <i data-lucide="lock" width="22" height="22"></i>
      </div>
      <h1>Panel de administración</h1>
      <p>Acceso exclusivo para el equipo de moderación de AlertaBo.</p>

      <form id="formLogin">
        <input type="password" id="campoPassword" placeholder="Contraseña" autocomplete="current-password" required>
        <p class="tarjeta-login__error" id="errorLogin"></p>
        <button type="submit" class="boton boton--primario boton--ancho-completo" id="botonLogin">Ingresar</button>
      </form>
    </div>
  </div>

  <script src="/admin/js/login.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => { if (window.lucide) lucide.createIcons(); });
  </script>
</body>
</html>
